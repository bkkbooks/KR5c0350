front:
  text: 上洞心丹經訣上之二
  hash: sha256:d15e1405a616412af3365c288c15d593f5d11562a581f4aef62d45efef193f66
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0350_HFL_000-001a, image: hfl/0600/0600-056.png}
body:
  text: 太極真人嗣孫手述仙翁曰欲求神仙當得至要至要在寶精行氣服食大藥雖云行氣而行氣有數十法大要在還精補腦雖云服氣而服氣之法百餘事大要在胎息雖云服藥而服藥之方千餘條大要在金液還丹訣曰寶精行氣數十法此不具載其大要在還精補腦者其法須於子後午前六陽之時為之或子後丑前或身中陽生之時而為之善矣於此時入靖或不拘行住坐卧亦可須當內外貞白專氣致柔如嬰兒然後自玉堂尾閭起火行氣直過夾脊雙關上入三山直至玉京山久則自然腦滿三一九室之妙道實在於斯焉訣曰服氣之法百餘事如非烟碧靄中黃玄黃沆瀣淪漢紫霞青芽耀靈望舒靈曄欻炎九罡五精皆服氣之法若此未易詳言而胎息一法實為服氣之大要其法始焉必用震卦時入靖或不拘行住坐卧必要內外貞白專氣致柔如嬰兒然後如子居母腹呼吸在玄牝之根綿綿若存久久服之直使一萬三千五百息息息入胎一日十二時百刻刻刻調和小則骨正筋柔膚若凝脂百病不侵延年不死大則入水不溺入火不焚脫胎换骨隱顯變化身外有身與道合真其道在人耳此二要訣者內丹之道要於斯畢矣訣曰仙翁云服藥之方千條末學豈能周知其大要在金液還丹者今古登真達道而成仙者未有不由金液還丹而能成者也其金液還丹者外丹也古聖鍊法有無中生有之金液還丹者上也此乃上古聖聖以心傳之不留文字而至祕者也要之非凡俗所可知非末學所能成其爐竈鼎器採藥進火之法實未可輕泄於言語文字之間斯丹一成拔宅飛去變化其可量乎其有九鼎飛伏金液還丹者次也此亦聖賢授受以口傳之豈文字能盡者中間取玄黃華造六一泥漆土釜固神爐作華池生神水釀春醪醖左味採藥材進火候一切飛伏返還金液之法非至士真人不能鍊豈下愚凡俗之所能獲也今仙翁玉笈所珍心丹一方乃太上上洞仙經之所載金液還丹之次方也藥材乃九鼎中之第一性味乃八石中之上等制鍊有方轉鍊無異不用雜類止用一珍九轉鍊之而成金液還丹自换骨而至飛升井井有條接引真仙上入太清與無中生有之金液還丹殊途同歸功用不異實為至道不煩之妙也凡世希有之仙方也仙翁曰傳受之法取旺相吉日先齊戒沐浴立壇設太上一座於水上於無人之地燒香上白欲以長生之道用傳某甲及丹經盟信之物著案上置座在此今欲受道向北伏一時之中若天晴無風可受之共飲白雞血為盟乃投信物於水中萬兆無仙骨者終不見此內外金液還丹之道也故吾師云一代之中不過二三人得之又云八極之內將詎幾人見知祕訣難聞得之者少必盟誓方事相傳長生神仙之藥神祕至重萬金不傳必授賢者若有傳者限百年內得傳一人歃血為盟而後傳之若於至人違負漏泄天帝譴謫永謝玄路太玄仙都使盟者心迷意亂所傾敗死即仙君使精神昏濁所學不成大司録三天司命减算伐年所作不成受罰於太玄都仙翁曰欲合神丹當於深山大澤或窮里曠野無人之處若於人中作之必於高墻厚壁令中外不見亦可也結伴不過二三人耳先齊七日沐浴五香置加精潔勿經穢汙喪死嫁娶之家相往來仙翁曰欲市其神藥必先齊七日以子丑日沐浴以執日市之當於月德地坐勿與人爭貴賤玄女曰作藥以五月五日大良以用七月七日始以甲子丁巳開除之日為善甲申乙巳乙卯次之作藥忌日春戊辰己巳夏丁巳戊申壬辰己未秋戊戌辛亥庚子冬戊寅己未癸卯癸酉及月殺及攴天季四孟仲季月收壬午丙戌癸亥辛巳月建諸朔望皆凶不可用以起火合神藥愼不得與俗間愚人交通勿令嫉妬多口舌人不信道者聞知之也神藥不成神藥成便為真人上天入淵變化恍惚可以舉家皆仙何但一身俗人惜財不合丹藥及信草木之藥且草木藥埋之即朽煮之即爛燒之即焦不能自生焉能生人可以療病益氣又不免死也還丹至道之要非凡所聞夫肖形天壤人最為貴限以速老則死善養則生生可惜也死可畏也是以道家至祕而重者莫過此長生之方也若長生之藥方法莫過此神丹之道也若此道不長生則古無長生矣夫生之在己其利實大論至貴賤雖爵為公侯不足以論比其輕重雖賞有封畿不足以百年之壽三萬餘日幼弱則未有所知衰邁則歡樂無味童蒙昏耄除數十年平和喜笑八九千日飈飛電激顧盻以盡今百年者萬中一焉假或終之哀憂迫擾所以上士之務先營長生事定可以任意不期羽化取樂人間同彭祖之享年比少君之遐壽可以畜妻子可以居官秩無虧上下之節不失人理之歡實盛事矣人之為體易傷難養攻毁之者非一條過於尅剝劇乎搖拔精靈固於焦擾榮衛消於數用煎熬形器尅削平和飲食失宜榮衛過度當風卧濕變起膏肓方托命於草木之醫或投誠於祭祀之助猶渴穿井於高阜若飢起耕於石田草木之藥何所補之神鬼之力曷能濟之若命可以草木延病可以祭祀除則醫人悉長生巫師永不病故經云不在祭祀事鬼神不在誓願多言語養生之道唯在神丹知之不易行之實難而學道之人少進多退競知者衆克終者鮮如井不達泉終為棄井故非長生難聞若聞道行之為難非行之難終之難也非至明不能察也非至勤不能學也若易得則漢武遇少君已得之矣易明則劉向案枕中已明之矣故黃帝登崆峒而訪道夏禹封金簡於玉函或功就而上升或道成而仙去事昭故實法茂前修者長生之法若不精加功勤徒學一切旁門無益要當時不可失不俟終日生前一切之有為唯有長生之可重神丹一成與天地相畢仙翁曰世之鍊靈砂者乃用抽出砂中汞配硫黃二八而成靈砂但至一轉者至士服之可以通靈故號靈砂愚人服之百病皆愈若到九轉號稱還丹依法鍊服亦能變化飛升其硫黃乃火輪與日輪之氣相交而生此丹砂者具南方正色禀太陽真精含天地之至神列仙藥之上品蓋其內具硫體而含汞若依仙方鍊之九轉乃真靈砂也修煉之士服之指日升仙飛升太清其功莫可言也上洞太一心丹祕方按本草丹砂味甘微寒無毒主療身體五藏百病養精神安魂魄益氣明目通血脉止煩滿消渴益精悅澤人面殺精邪惡鬼除中惡腸痛毒氣疥瘻諸瘡久服通神明不老輕身神仙按仙方鍊為還丹金液服之者腹中三尸九蟲死身中一切諸病盡皆除愈髮白更黑齒落更生返老還童延年不死神仙蛻殼换骨日中影不見始服之壽百歲三轉服之壽三百歲五轉服之壽五百歲七轉服之壽千歲九轉丹成功行圓滿服之飛升昔李少君數百歲在人間陰長生四百歲挈妻子遨遊州郡古之如何候拔宅飛升者八十餘家白日飛升者不可勝紀是有徵驗久矣仙翁曰凡造藥起火皆爐邊施祭以好白酒五升牛羊脯各三斤黃粱米飯三升大棗三升梨一斗熟雞子三十枚鯉魚三頭各重三斤凡用三案案皆二碗再拜祝曰小兆臣某恭誠惟大道君老君太和君哀小兆臣某貪生樂道轉鍊神丹願祈使某令藥不飛不亡皆使伏火藥已好善隨手變化黃白悉伏服藥飛仙朝於紫宫命長無極得至真人行酒起再拜畢諸赤色果木橘柚皆上之訖然後造藥行火如法心丹丹砂上等紅明如菉豆大者不拘多少一云約斤半分兩可矣用無根草煮之即紫背浮萍也其草多寡對丹砂分兩同濃煎水約可浸二七日之多藥水浸丹砂二七日每日早溫熱草木浸之二七日皆溫之止用元煎草水不用續添至日數滿劈去水晒乾裝入神室作神室法用好雞彈八箇醋浸略去𣆟皮頂上微開一小竅約小指拇大慢慢傾去黃白洗淨控乾然後磨上等京墨濃磨墨汁傾入雞彈中搖轉令上下皆遍微於火上炙乾令遍黑如不黑再用黑汁如前三上之尤妙此即崑嵛紙法也選四箇好者作裝藥者余作蓋乃用鞋底針於四箇雞彈周圍勻針七箇針孔以象心之七竅也四箇殼蓋亦如前墨汁塗之凡雞彈色白神不可居墨色染黑故神可安藏故號神室也右將神室於香上用名香真香薰之亦行禱願感天動地祈祝焚香再拜如前香烟滿神室中然後將丹砂裝入直要裝滿稍若不滿則虧火力裝訖用雞子清搽在神室口外蓋口內亦搽之蓋定後用後藥固之四箇神室裝藥蓋合皆如上法固神室玉牀藥法訣云丹砂之生下有白白牀上有白玉龕此丹固神室藥種地匱藥皆白者象丹砂之玉牀玉龕也猶人之心包絡也石灰搗羅為細末用極酸漿水浸七日了去水晒乾復搗為細末取淨灰半斤生砒石半斤搗羅為細末右二味用白礬煎水調固之固訖然後裝入五行玉匱五行玉匱法此玉匱象玉龕也砒石五斤打作小塊用紙褁絹帛包住復用死硝半斤鹽𣆟小朴硝一兩三件和在釅醋內乃以上件帛包砒石於醋內懸胎煮之須煮七日其醋約五六瓶方可煮七日煮了取出砒石晒乾死硝二兩死硝用皂角伏之每斤硝石須用皂角二斤烈火上伏之鹻二兩硇砂二兩右件玉匱藥通計五斤六兩搗為粗砂末用砂碢一箇大小約可裝藥者此名土釜下安玄精石一抄於釜底後裝四玉匱藥薦藉勻安四神室於中又用玉匱藥覆蓋訖後用玄精石凑滿泥封釜口瓷蹀子緊蓋毋令不滿有妨火候用鐵線八道扎縛鐵線餘者紐成疙疸約二指高復用薄泥約一分厚護蓋鐵線瓷蹀訖裝入灰爐養火五五周天火候法訣曰仍以十箇月為節以象胞胎也後五箇月土數也故五五二十五足土氣也一十箇月火候一兩四錢次十箇月火候一兩六錢後五箇月火候二兩一錢周天火足次行補火止補月小日數蓋此乃月之周天數也行補火法法用平底灰爐中乃换鐵架閣丹釜架腳可高四寸早火每絡七錢三絡計二兩一錢腳高三寸下火晚火每絡八錢三絡計二兩四錢飛火平於頂上鐵線上火絡法其法用鐵線造絡六箇分作早晚用絡形闊一寸長一寸半有蓋下新絡起舊絡宿火不可留宿火其行補月小日數火足然後開爐取出丹釜剪斷鐵線去瓷蹀取出四箇神室鋸開其神室必體硬如瓷瓦難鋸當於木上先開一彈窩可容神室一半然後放上神室輕手按住緩慢鋸齒來往鋸開取出丹砂用藥水沐浴蘇醒丹火補其元氣浴丹補氣藥水法用山葡萄子乾者一兩煎水濕者用四兩紐汁用加入石腦油樟腦油各四兩重三件和勻約水大半碗開彈傾入水內必滚儘其滚聲住候冷取出試丹試丹法試丹用赤銅一兩鞴鎔成汁以丹半錢中點化然後將生硝一塊如青梅大放入其丹硫內有硫黃其氣能令點化銅色黑須再用壁土一塊入甘碢收硫氣必用鉗攪令如水光淨然後傾出如不淨再加入生硝壁土如上法直候如水光淨傾出八箇正色之寶不須加母若似此點化出其丹靈矣此為九轉丹母也丹體雖靈猶未可服止可作匱升入九轉丹法亦不可以多用點物虛費丹母有妨九轉論試丹說按方書銅之為物能補人骨損折處凡服銅藥直至損折骨上如鋪筋漆堅固其損骨硬如金石令試丹以銅化成至寶其仙方换骨之道歟若節節升轉九轉而服之當知骨化寒瓊必矣太極真人說玉石三百六十種丹砂為上品第一古以為養性命成神仙長生之大藥也仙方鍊服之方非一法製之或以酒或以醋或以漆或以蜜然得法皆可養性命致長生不死神仙要之伏火而為金液九轉而為還丹比諸方為上法此丹欲為地仙壽千萬歲欲為神仙便可朝金母拜木公膺圖籙登靈臺换骨而飛仙欲為天仙便可逍遙乎鬱羅蕭臺臣事乎三清之境也有仙骨者方遇此法有道德者方遇至人如遇者勿以輕易而侮慢或不盡其口訣虛費爐竈或招譴謫而身謝玄路此乃自貽殃咎又何咎焉草木三百六十種而黃精為上品第一此亦養性命致長生不死神仙之靈草也詳世之草木金石萬物之性類凡禀陰氣者皆含毒而能令人死凡禀陽氣者皆能令人生黃精生於山之南禀太陽之精勾吻生於山之陰禀太陰之精氣而生故令人速死毒能致腸胃寸斷陰毒可畏之甚也丹砂禀太陽之真精火輪之正氣與太陽同色與黃精同功用為陽之精又何疑日中有烏內舍陰也砂中有汞內舍陰也鍊之九轉而成金液還丹者純陽也其丹砂之生上有玉龕下有玉牀其為造化之貴重可知矣上洞心丹經訣卷上
