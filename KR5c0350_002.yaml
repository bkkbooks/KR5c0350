front:
  text: 上洞心丹經訣卷下之四
  hash: sha256:ba0496a06b5827fdfb8201363f7fc9650d050246291ef624d855380229fd54bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0350_HFL_002-001a, image: hfl/0600/0600-116.png}
body:
  text: 太極真人嗣孫手述黃帝聖紀經曰黃帝元年寅月寅日齊於首山方明牧力從黃帝以上具茨謁大隗君授黃帝以神芝靈圖十二卷金銀方十九首黃帝又登王屋山開石函發玉笈得九鼎神丹飛雪爐火之道黃帝峨嵋山見皇人禮請神仙之道皇人曰子豈不知天有玄一生於右陽名為流珠為衆妙之門得而修之可令子長生升雲飛霄上朝玉帝黃帝拜受於荆山鑄金鼎修合流珠大還神丹令傳後人而於鼎湖服而上升時有大臣七十二人得丹服之者亦從黃帝上升先是黃帝恐金丹道絶授於元子令傳後人而誡之此道至重必以授賢者苟非其人自招殃咎後元子又傳東山子自此以聖傳聖以賢傳賢以仁傳仁得道者不可勝計天之愛人甚矣而人自非心不合道固難成也太上內丹歌真鉛之精在混沌中生天地先混沌既分乃成四象而立五行得天地本立性命胚符合寒暑優游丹臺十月滿足如子脫胎獲此玄珠神明自來太上外丹經節大道守真三品為則以一為度以正為德故鍊金液者神方也妙玄清虛莫不由金符而得道履九幽而入冥上下虛無因神明而得升即授喜太清八符經太清觀天經九都經神丹經金液經八鍊九轉還丹伏火之訣焉其方曰金液還丹仙華流珠高飛雲霞翔登天丘黃赤之物須臾當得雄雌紛珠可以騰變以致行厨靈人玉女與我俱遊出入無間與天同符其精凝霜善致沉浮汝其震欽必遊仙都金液之訣盡於此矣夫水銀朱砂硝液流珠以作神丹服一刀圭飛升天宫丹成作金以為食器乃得神仙汝審欲神仙先當服還丹金液乃存其神即得升天上為真人汝不服還丹金液當自苦爾為寒濕風鬼所擊司命不能救也道之如此可不勉哉汝善溫衣少食適體守虛虛無自然鬼亦不能殺也年壽盡終即自死耳何以言之以其不堅無神故也譬猶萬物之生非欲求死但自老朽枯槁腐死耳人亦如此矣吾以作禍則妖魅試人猛獸傷人蛇蝮螫之矣昔左元放於天柱山中精思而感神人授之以金丹仙經會漢末大亂不遑合作而避地江東志造名山以修此道乃以神丹經等授弟子葛仙翁又以授弟子鄭君鄭君家貧無以買藥而葛洪者鄭君之弟子親事勤苦乃於馬跡山立壇授洪丹經並諸口訣謂洪曰吾承先師左君之誡曰諸小山中不可居作神丹也且小山之中無有正神皆是木之精千歲老物血食之鬼此輩是邪氣不念人修道作福但欲於禍人也夫齊潔之士雖以術數辟身而鬼魅或能壞人藥也今合醫家佳藥好膏皆尚不欲令雞犬及婦人小兒等見之如藥被見者用便不驗又染彩物者遇惡目見之皆失其色也況神仙長生之大藥乎古之道士合作神藥必入名山無人之地終不止於小小凡山中正為此也又按仙經可以精思合於仙藥山者有泰山華山霍山恆山嵩高山少室太白終南等山此中皆有正神其中有地仙又生芝草可以辟大難不但堪合藥也若有道者登之則此山神必助之為福也至藥必成凡山大則神大山小則神小無防避之道有必思害也或被疾病或遭驚怖或患傷刺或聞異聲或逢變異或見光景或大木不風而摧折或巖石無辜而自墮或令人迷亂狂走墜落坑谷或猛獸毒蛇犯傷人故不可輕入也凡入山當擇四時旺相干支相生之日吉也東嶽忌甲乙寅卯歲月入南嶽忌丙丁巳午歲月入中嶽忌戊己辰戌丑未歲月入西嶽忌庚辛申酉歲月入北嶽忌壬癸亥子歲月入但所之此山屬其嶽之方面者皆悉禁此歲月也靈寶經云入山當以保日及義日專日大吉若以制日伐日必死保日者干支上生下也如甲午乙巳是也義日者干支下生上也如壬申癸酉是也制日者支干上尅下也如戊子己亥是也伐日者支干下尅上也如甲申乙酉是也專日者支干比和也如甲寅乙卯是也入名山當以甲子開除日以五色綵繒各五寸懸石上所求必得入名山亦癸之時此謂天心日必得仙道度世也入山良日甲子甲午甲寅乙亥乙卯乙巳丙戌丙午丙辰皆大吉必安隱得道大月忌日初三十一十伍十八二十四二十六三十日小月忌日初一初五十三十六二十八若犯此日入山既為山神所試所求不得所作不成豈但道士忌之凡人此日入山皆凶與虎狼毒蟲喜相見入山宜知六甲祕訣呪曰臨兵鬥者皆陳列前行凡九字當密呪之無不辟惡要道不煩也又入山月忌之日正月午二月亥三月甲四月戊五月戌六月申七月甲子八月甲午九月寅十月辰十一月乙十二月丑上古入山合丹求道潔淨賫三皇文及五嶽真形圖所召山神及按鬼録召里社及山卿澤尉問之則知木石之怪山川之精不敢來試人也凡諸邪物自然遠匿黃帝東到青丘見紫府先生受三皇文勑召萬神即此凡入山合丹欲辟山川廟坐百神鬼之法最以符為切要神仙大藥亦資符力而辟衛也符法者老子於神人授之者也今人用之而少驗者由於傳寫多誤又信心不篤徒施用之然凡求長生制之在藥不由符力而能致之仙也然不可廢者藉其却鬼辟邪以丹之漸入名山賫召高山君符此符齊十日召高山君使除虎狼之害其符以丹書繒上一尺二寸長亦如之若書時不得中息而語也書畢燒香夜於淨室之中隨月建立著新衣服而召之凡用符以大字著左右心前恆正思慕其象之宜旁召六甲直符並玉女名字賫所召之書仰視面想思八方之外存神長五尺衣服如六甲經此登山符仙人陳安世入山甲寅日書白素上夜向北斗祭以酒脯自說姓名以著衣領中辟邪精百鬼老物虎狼毒蟲帶之置案上面向北斗此符一本書點畫如此用法如前同只點畫大同小異與前不同其功效一種無别故兩存之此符以丹書絹素各異之帶著肘後男左女右亦可以書白素帶之可以著住處四方各一枚若移徙當先令人拔取此符大神勿妄傳也此符亦是登山功效不異是老君黃庭三十九真祕符辟百鬼合仙藥和合之處住必須名山極深之處無人畜行跡乃有東流水大石巖室之中若無巖石室可於深林之中無人跡處作室常須近水非其處勿措意作神藥大山無東流水西流亦得此得居山住處安以丹書柏板上大文書令彌滿其板上著門上四方四隅及所行道之處安之並五十步辟諸精也此符是去狼虎之符與前同移徙板將辟山精用按為道者多在山林之間乃是虎狼毒蛇精怪魍魎之窟穴也不深防辟損害藥也辟百蛇即及却虎狼符此二神印取棗心刻之方之二寸畢設祭再拜請佩之甚有效此黃首朱宫玉女簡房教導之印能却虎狼不敢前此亦可為符朱書吞之入山辟虎狼亦可為印出玉胎經也此符却鬼合藥時懸安四面制諸鬼大神驗一本中心有七曲餘並同不知誤者此山居符書之於柏板上安門四角虎狼不至已上三符並用朱書屯符有一本下如屯此開山符以千歲虆為奏長尺二寸以丹書此符以印大石名山山門即開寶書亦出金玉皆見千歲虆者天慈也如鼠耳却鬼制魅也右於深山靜處作丹屋四角懸鈴子並作却鬼藥却鬼符安四面然後可合藥若不然者鬼神吸其藥精盡或變却是以須作符厭禳之却鬼藥法以光明砂雄黃雌黃麝香附子白术鬼臼鬼箭各二等蜜丸之帶昔黃帝受丹經於玄女訪真一於皇人故云長生仙方唯有金丹守形却惡獨有真一古人尤重焉仙經曰九轉金丹經守一訣皆在崑崙五城之內藏以玉函尅之金扎封以紫芝印以中章此蓋上聖寶祕之法也身疾未愈神丹未就年命未定衆邪未遣守一之道不可不知也入山守一則百毒不敢近人不須諸法百邪自去也作丹屋法先擇得深山臨水懸巖靜處人畜絶跡施帶符印符室法庭前其室方十二步高二丈四尺南門著扉門前使有東流水東日西月表裏香泥泥之四方各作主丹符也於室中立五嶽三台西方壁下别立層壇置諸藥草及神丹經訣目録並布於上即有生藥使者護之萬靈不能干也合和防辟法凡欲合丹於山中安堵訖乃召山神請問可否方得安穩施行萬無不成其法如左此後諸法仙翁持用諸符也齊十日丹書黃素一尺於山草間召中嶽君主欲作神丹先召問其節度以符字老子合神丹之日以朱書白素八寸盛以絳囊繫心前欲服丹者當迎七日服之即便通靈役使此名太一八寸素符此符合丹人服之令心開勿汙辱之太清神丹寶經凝鍊八石五耀七明玄宫寶鎮檢御火靈九轉成華長升太清祝畢以青錦囊盛符繫於頸上此符檢制石精令不飛亡使烟霜充滿神華凝結却害符以丹書白紙上廣三寸長四寸以投爐中即伏精思常見神光加精諸神來至仙人玉女來見也即神丹成天地鬼邪不能害也法曰夫欲為神丹五石變化出五金之法皆當謁天上皇道君受五神符則五石五金隨意而化爭出其精青帝符法甲乙日白茆為藉長三尺青繒長一丈二尺布藉上酒二杯脯二朐以繒為地墨書符廣二寸長七寸置藉上呪曰吉日良時小兆臣某再拜謹受上皇道君青帝神符因再拜燒符服之此應一箇符圖寫校差參須詳審之赤帝符法以丙丁日白茅為藉長三尺絳繒長一丈三尺布藉上酒二杯脯二朐以丹書符廣二寸投符藉上呪曰吉日良時小兆臣玄再拜受上皇道君赤帝神符因再拜燒符吞之黃帝符法以戊己日白茆為藉長三尺黃繒長一丈二尺布席上酒二杯脯二朐朱為地以紫書符廣三寸長七寸投席上呪曰吉日良時小兆臣玄再拜受上皇道君黃帝神符因再拜燒符服之右已上大寥落不相附近計是一符復用審之白帝符法以庚辛日白茆為藉長三尺白素長一丈三尺布藉上酒二杯脯二朐緑為地以丹書符廣二寸長七寸投藉上呪曰吉日良時小兆臣玄再拜受上皇道君白帝神符因再拜燒符服之黑帝符法以壬癸日白茆為藉長三尺皂繒長一丈二尺布藉上酒二杯脯二朐黑為地以丹書符廣二寸長七寸投藉上呪曰吉日良時小兆臣玄再拜受上皇道君黑帝神符因再拜燒符服之右按前五帝神符後四符每云玄者仙翁受時稱之諱也併書兩通燒服之一通頭上帶之彌為變化家用於欲丹時前十日作之夫大丹者金火之精華真人之所珍是故服之者神仙變化長生久視役使百靈上升太清者也俗人徒知其丹經之篇目而不知合丹之忌諱雖得其方而無成者此也夫神丹欲合者有五忌三諱四敗六畏也若犯之者丹精飛散靈華墜落神光沉遁霜烟損失服之無益不可不愼也所以真人請問其目玄師答曰五忌一者合藥及發火時無犯五石死日也謂春壬辰夏癸巳秋丙戌冬丁丑用之石精死結合毒藥之無益也二者忌市具神藥及論說丹事無用五邪生日謂春壬寅夏癸巳秋壬申冬癸亥以其日入山合神藥皆無所成神盡不佑鬼邪敗人三者忌合神丹入名山忌五嶽傷絶日謂春庚寅夏癸未秋丙申冬丁丑以其日入山合藥及採芝草神靈録人魂魄丹藥損壞疾病傷身四者忌合神丹爐釜及封泥神藥無用天開地破日春丙戌丙辰夏辛未辛丑秋壬辰壬戌冬癸未癸丑以此合神丹爐竈釜則丹室自開石精散泄飛揚丹華皆敗五忌者合丹男忌七月三日及七月甲寅日女合丹忌正月七日及正月庚申此四日是石精交戰合鬼之日以其日執事起火則丹精不發神靈不感邪鬼來入皆為凶敗此所謂五忌也三諱者一諱合丹之時泣淚悲傷也二諱犯丹弒賊名字也三諱凶衰淹穢死産乳也按犯此三諱則石精哀結五華不曜其丹必毒入口殺人凡八石至忌憂戚泣淚及臨尸凶淹之人皆不可厠預丹爐等事也又丹有弒賊惡鬼謂所名不葱子字混泥洗合丹始火之日愼呼此名字也若犯之則鬼兵來入神爐破碎精華散出四敗一者地無丹氣謂非神地二者見嫉妬之人謂惡眼人見神藥則致鬼殃也三者侣非其友四者五辛臭物及燒雞犬毛也按此四敗者八石之所大忌不可犯之六畏者一初封藥之日及始火之時畏遇風雨雷霆二者合丹之日畏聞唤魂魄聲三畏四畏脫開五者合丹畏聞悲哭聲也六者畏見一切血腥汙穢之事也按此六畏者皆神丹之所禁忌有聞而犯之則神精驚擾靈氣損也仙翁曰服第一之丹流珠九轉及丹華二丹功能者以甲子日平旦向日再拜長跪服之如黍粟即時神仙上升九天服半黍粟即為地仙入火不燒入水不濕萬惡不中兵刃不傷變化自在出入無間役使鬼神壽同天地若欲去代更服半黍粟即時升天欲度俗人服如小豆即日升仙服半小豆即為地仙及六畜令服如大豆即時升天故曰鳥得之為鳳獸得之為麟蛇得之為龍鬼得之為神女得之為玉女男得之為仙也以蛇脂和為四丸如彈丸許埋所居宅處四角即變為赤龍舉宅升天去地七千尺變為金玉任情所適埋一丸如雞子黃隨所遠近方圓千里下徹九泉其中所有江河山林皆悉升天矣取黃土堅實細理者一斤細搗篩沸湯煮之三沸以一銖投中熟合和煎令水盡變成金仙翁曰諸丹成而服者乃多格人以三品言上中下上士七日登真下士服之七十日得仙愚人服之一年乃仙若還至誠便敢頓服刀圭者皆暫死半日許乃生如眠覺狀此乃嶮之至矣必須依方以半黍要為度伏聞學道不成所由有八一者偶知一事便言已足劬勞鼎火皓首無成二者雖遇奇方謂非實法求之不已遂至蓋棺三者真僞不分無師取訣意無一定消棄光陰四者恃所聰明忽略知法自言已得不盡師心五者真方祕訣非易見逢謂在名山歷險損命六者家無儋石飢寒切逼得如不得知如不知七者性不精專復無蓄積明師已决疑而不行八者所遇之師師素狹劣惜其淺短不盡教之告云道不在多矯生寶祕謂以為實遂至守株也仙翁曰合丹當求道養真勿貪俗利榮華造黃白致使靈祇不佑鬼忽恚以致不祥夭橫傷年深宜愼之不得妄傳非人非同志者不得輕泄之的有殃譴仙經曰有仙籍者謀之者死犯之者滅門憎之者亡上洞心丹經訣卷下
