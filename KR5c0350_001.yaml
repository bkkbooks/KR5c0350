front:
  text: 上洞心丹經訣卷中之三
  hash: sha256:d1e6b8f37fe245a2120c624050f36e430a0b994924c9a004ca4366890a811824
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0350_HFL_001-001a, image: hfl/0600/0600-086.png}
body:
  text: 太極真人嗣孫手述仙翁曰參同契云植禾當用粟覆雞用其子燕雀不生鳳狐兔不乳馬斯言盡之矣夫人五行順而形生逆而成真稟陰陽五行之氣而後有此身然身中之寶者神也神之在天為熱在地為火在人為心神也心也為道之祖修仙之正法也今以丹砂一味九轉鍊之為金液還丹者實此理也若悟此理修行外鍊還丹依方服之內求玄珠於赤水之中結還丹於黃庭之內使內外丹成九轉變化須臾與道合真蓋內修者陰丹也外修者陽丹也陰丹就而命延陽丹就而升騰故修道之士有內丹者可以延年得外丹者可以升天內丹成而外丹不應外丹至而內丹未克皆未能升舉吾所以授三一九室者內修之要也還丹金液者外鍊之極也勉而修之可成矣弟子即再拜受教終身祕之仙翁曰凡欲長生而不得神丹金液徒自苦耳故呼吸導引吐故納新及服草木之藥可得延年不免於死也若服神丹令人神仙度世與天地相畢與日月同光坐見萬里役使鬼神舉家升虛無翼而飛乘雲駕龍上下太清漏刻之間周遊八極不拘江河不畏百毒按草木之藥可以攻療疾病不可以致長生也金石之藥可以必獲延年而亦能兼除百邪也夫草藥之為物也虛脆柔軟不堪而久煮之則爛埋之則腐燒之則灰停之則朽不能自堅豈能堅人乎不能自生豈能生人乎若丹砂之為物也是稱奇石最為上藥細理紅潤其質堅固貞祕積轉逾久變化逾妙能飛能粉能精能雪能為真汞能為還丹能拒火能化水消之可以不耗埋之可以不壞靈異奇祕我難以稱然而得要則全生失法則傷壽人見本草云丹砂無毒謂不傷人不知水銀出於丹砂而有大毒故云水銀是丹砂之魂水銀因丹砂而出末既有毒本豈無毒淺識狹觀不思遠大性命之功蹉跌不追所以古人深懼除惡務本必先煮鍊方入大丹殊途同歸皆令伏火不拘日數莫限人功事資於養不宜急速人見丹砂是石乃言諸石燒之為灰其丹砂何得獨爾不化殊不知丹砂色赤而能生水銀之白物變化之理頗亦為證以丹砂而為金液猶土得水而成泥埏也山之下有金其上多有丹砂變轉不已還復成金歸之本質無可怪也故昔漢朝有李少君者乃數百歲人也不聞有它能唯以丹砂作還丹或以還丹為金以金為器以器盛食以食資身漸漬腸胃沾洽榮衛藉其堅貞以駐年壽事漢武帝不盡情實乃以祠竈左道之術奏進不以還丹金液之正訣上聞徵至卒以化去武帝思之故知惟有丹砂轉鍊之道金液還丹之妙令人不老不死可謂大善焉仙翁曰此丹砂轉鍊之道非獨服餌長生用以浴身俗疾不能干衆災莫由害也此法本出玉皇祕藏隱文非俗所有自非稟其仙籙者終不能見吾留此訣文以開後聖若得此訣者必須依傳授法受之不得輕吾告受非人也非所受作不成亦萬劫學仙道永不得成也又云受法不得輕告傳法日取旺相日結齋立壇師與第子並在壇前日夜燒寶香奏帝祈請所願長生藥録名目稱某少好長生上道萬劫以來常蒙道福今得奉恩聖允蒙師慈念許受訣文某今不敢許納一一奏請皇君師言弟子某求道日夜無怠某欲授某訣文不敢自許一一奏請皇君如此謹心滿七日夜然香登壇飮血為盟分金鐶投東流水中請師傳授諸神金丹若及傳口訣圖籙皆同此法傳授若不依傳法諸受師與弟子所造不成此金液還丹中訣文也狐丘先生授葛仙翁曰命屬仙星名録繼我今故授汝金丹訣等及修仙法汝依而用之汝若傳之自非決志山巖不規俗利者歃血分鐶立壇為誓終不得妄傳傳非其人名削福簿殃及纍代愼之勿妄傳也此是神丹萬金訣也神仙九轉祕方訣曰凡轉丹皆須於爐前施祭其祭法如前造藥起火祭法九轉並同第一轉法訣曰其轉法每一兩生丹砂可用四兩伏火丹砂匱養之此第一轉丹砂四兩中必用伏火砂一斤作匱生丹砂若見伏火砂如貓見鼠如羊見虎隨性伏火不復敢動矣朱砂紅明如黃豆大者三兩重山莆萄水浸七日每日溫熱水浸去水晒乾法用滑石作一盒子如當三錢厚約可盛二十餘兩微加大些子裝滿銼之先裝一層熟砂鋪底復以生砂如栽蓮栽之又蓋一層熟砂又一生一熟裝之裝了復用熟砂蓋頂蓋頂了然後銼去盒子餘弦令與丹砂平却用盒子蓋蓋之令砂貼蓋為妙蓋訖用泥封固古用石膏固則難開泥固易開故也既有伏火砂匱雖不固亦不飛走此用泥故也然不若依古法用石膏為妙緩開之可也仍用鐵線八道扎縛餘下鐵線紐疙疸二指高九轉同轉丹立爐法用板作爐底周圍簽釘竹子作骨又用蔑織成爐上下桶直約一尺闊泥厚一寸口闊九寸身高一尺一寸內安鐵架其鐵架三寸高腳藥盒子坐架上灰蓋行火此爐九轉皆用法並同一轉火候一兩四錢九轉皆不用補火每轉十二箇月滿開揀出丹砂四兩其一斤丹匱並不用可點化用之一轉靈丹依法凡劑服餌服一轉丹法一轉伏火朱砂一錢重研碎為極細末用首男乳半合華銷銀盞盛其乳汁於重湯內緩緩熬熟微下一𣆟白麵打成糊圓如黃豆大將皮紙作一鍋子懸虛於慢火上銀錍子炒一箇時辰不可炒破紙如紙焦急换紙鍋又炒令乾取火力令乾故也服用人參煎湯五更向東正面立吞服約半箇時辰不久渾身熱極口乾當預備九大缸滿水急入水缸中坐如又熱别入冷水缸若熱又入别水缸內如九缸水皆熱直候熱定身涼而止過日皮膚盡退鬚鬢眉髮俱脫落復生老者返少如蟬蛻殼轉轉服之各有功效具如經説有內丹者不須水按此服餌一轉丹法若非志慕長生心無疑慮內丹腦滿不可輕服若浮躁性情又多疑惑反致殃害何故若常人不修內丹腦髓虛耗不滿服此則骨精有損反致枯燥若心疑慮心火一發煙焰燒身不可救矣故九轉丹成常人服之化為鮮血豈不信哉此雖一轉之丹服者不可不愼服丹之後當修內丹法要打坐內外雙修內丹與外丹相應出神法皆在此矣修內丹法祕訣太極真人訣曰丹室須要潔淨常焚寶香密室無風不可太明不可太暗高低得中絶禁一切忌諱不淨雜色之人來往如老病喪孝産孕體臭四肢不全篤廢等疾僧道間人婦女貓犬皆是不令外人來入為妙選直時童子聰明至誠者二人為侍使又不可令人知有此丹室仙道貴祕密故也又不可對人言説現修內外神丹及其法若令雜人及不信之人知此修行及對此等雜人説並見皆不能成仙道也修丹室訖然後設一座有几並設一榻座並榻致令膝平不令高低枕高四指室中燥濕得宜皆要潔淨衣服被褥厚軟鋪陳及飮食湯藥茶酒烹調得宜須要潔淨具備切戒妨色太醉太飽太飢喜怒憂思一切邪精妄想皆不要有五辛厭穢亦宜戒之若犯房色及臭穢皆能傷丹誤人不遠秪在目前然後每日隨意歡喜靜坐須要一絲不挂萬慮俱無內境不出外境不入此心如鏡之明淨無一點塵埃此心如水之清澄無一點滓濁然後握固如嬰兒唇齒相著舌拄上腭呼吸綿綿以眼視鼻以鼻視臍自覺身孔毛間躍然如快又如淫欲交感之美以此驗之或盤膝或舒足或坐或立或行或卧皆同升降妙理具在其間卧則不可睡睡熟則氣散如能晝夜無睡極妙不能則少睡漸漸減睡可也常入胎息之功當以子時至午時畢不可以午時至子時蓋子至午謂之六陽其氣生午至子謂之六陰其氣死無益於人運胎息抱素凝妙閉鼻合眼口不噓吸如在胞胎中初學者鼻口引氣而閉之以心計數一百二十次方以口吐氣出引氣而皆不可令耳聞其氣出入之聲常令入多出少以鴻毛著鼻上吐氣鴻毛不動為法漸學增其計息之數久則至千數則老者返少死者更生可以辟瘟疫可以禁蛇虎可以入水火可以貫金石可以辟飢渴可以延年却死可以噓水火為之逆流但行此法不可多食肉生菜肥鮮之物令人氣強難以閉禁惜忿怒忿怒則氣亂胎息其驗如此子宜祕之口口相傳之道非世之常文勿示非人祕之祕之又運精氣自尾閭夾脊入腦尾閭穴在第十九節夾脊節在第十二節下補腦法其初當偃頭向後緊閉大椎穴第三節不令氣過先緊閉夾脊不令氣過大椎穴名上關夾脊穴名中關後漸漸一起直入腦滿腦滿之後丹自玄膺而下其味甘其氣香至此則內丹成矣久則有徵驗或身如坐甑中熱不可勝稍息或四肢身體內外冷如寒冰然後和焉至此地分勿驚勿凝後别有法妙在心授口傳入胎息法就行回風混合法使精合神神合氣氣合真混合神丹百日丹成修內丹至腦滿當行三一九室默朝上帝之道功成詔至飛升有期矣第二轉法訣曰浸浴法裝藥法封固法丹爐法九轉並同第一轉法後不復注丹砂一兩用第一轉伏火丹砂四兩重裝之計生熟砂五兩重用滑石盒子可容五兩有餘者裝滿銼之封固行火第二轉火候一兩六錢每轉火皆三百六十日九轉同後不復注右二轉陰數不服四六八轉同後倣此第三轉法丹砂一兩一錢半重用第三轉伏火丹砂五兩重依法製之通計生熟砂六兩二錢重用滑石盒子可容六兩二錢半有餘者裝滿銼之第三轉火候二兩一錢右三轉神丹服者亦依前法首男乳汁糊圓之如黑豆大人參湯服之當壽三百歲能出陽神遊四海與神人往來玉女來侍役使鬼神若以點化能丹陽换骨脫殼亦可乾汞第四轉法丹砂一兩五錢用第三轉伏火丹砂六兩二錢半裝之通計生熟砂七兩七錢重用滑石盒子可容七兩七錢者裝滿銼之封固行火第四轉火候二兩八錢右四轉不服亦可點化第五轉法丹砂一兩九錢重用四轉伏火丹砂七兩七錢匱之通計生熟砂九兩六錢重用滑石盒子可容九兩六錢有餘者裝滿銼之封固行火第五轉火候一兩八錢右五轉神丹服之如前法真酥丸如小豆大乳香湯下服之當壽五百歲入水不溺入火不焚形神俱妙列為仙官若以點化伏火丹砂一斤可澆汞四兩名瓊林玉樹便可分比瓊林汞寶作匱轉養朱砂此名玉笋止可澆汞一二次不然有損於丹第六轉法丹砂二兩四錢用五轉伏火丹砂九兩六錢依法裝之通計生熟砂十二兩重用滑石盒子可容十二兩有餘者裝滿銼之封固行火第六轉火候二兩八錢右六轉説如前第七轉法丹砂三兩用六轉伏火丹砂十二兩裝之用滑石盒子可容十五兩有餘者裝滿銼之封固行火第七轉火候二兩一錢丹至七轉服者用醍醐為丸如菉豆大木香湯服之壽千歲功效不必具稱若以銅錢鉛錫入匱中皆成上色銀若以雄黃硫黃粉霜砒石靈砂入匱隨能伏火不走分置諸匱各轉之若以糝制菉豆大可乾汞一兩成銀投之三黃即成赤金要當不可費用止可驗其功效第八轉法丹砂三兩七錢用第七轉伏火丹砂十五兩依法裝之通計生熟砂十八兩七錢重用滑石盒子可容十八兩七錢有餘者裝滿銼之封固行火第八轉火候二兩八錢右第八轉法同上第九轉法丹砂四兩六錢用八轉伏火丹砂十八兩七錢依法裝之用滑石盒子可容二十三兩三錢有餘者一生一熟如法裝之裝滿銼之封固行火第九轉火候一兩六錢丹成九轉又名紫金芽服者以龍膏丸如黍米大龍膏者桑上露水也每服一粒井泉中沉三日方服井華一汲水服之九轉依法置丹其人生命上及王相上依經立壇醮祭潔清齋戒置靈寶符於五方十二神符於辰上八靈符置八方掩天門掩地户歷華蓋入陰中取天心日天心時置九宫合丹者在中宫侍爐先問日奇合尋出宫為妙丹成服黍米飛升為真人矣祕之勿傳如人欲死以一粒口中以水灌下即活六月中死物腹中不拘人畜經夏不腐此乃驗也若用九轉神丹鍊飛三黃即同黃帝九鼎飛丹其法依上立壇潔清又立九宫八卦龜形爐上按天文下按地理以三黃置在丹砂上以天盤蓋之然後上火下水飛之掃下玄霜服一黍米紫雲隨至頃刻飛升若以點化一粒乾汞五兩成黃金至此豈可以俗利拘哉是在言化耳接金液還丹法合成者依經服一兩便升仙若未欲去代且住世為地仙者齋一百日服半兩則長生不死萬害百毒不能傷可以畜妻子若居官秩在意所欲無所禁若後欲升天者乃齋戒更服滿一兩即便飛升矣凡欲升天即皆斷穀一年方服之也又按此法凡服神丹大藥依經日數即輕舉升天減半服之即長生不死即是地仙無疑也上洞心丹經訣卷中
